name: Publish Docker Image

on:
  push:
    branches: [main]

concurrency:
  group: publish-image-main
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Compute image metadata
        id: vars
        run: echo "short_sha=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: |
            ${{ secrets.DOCKERHUB_REPOSITORY }}:latest
            ${{ secrets.DOCKERHUB_REPOSITORY }}:main
            ${{ secrets.DOCKERHUB_REPOSITORY }}:sha-${{ steps.vars.outputs.short_sha }}
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ secrets.DOCKERHUB_REPOSITORY }}:sha-${{ steps.vars.outputs.short_sha }}
          severity: HIGH,CRITICAL
          exit-code: "1"
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Push image
        run: |
          docker push "${{ secrets.DOCKERHUB_REPOSITORY }}:sha-${{ steps.vars.outputs.short_sha }}"
          docker push "${{ secrets.DOCKERHUB_REPOSITORY }}:main"
          docker push "${{ secrets.DOCKERHUB_REPOSITORY }}:latest"
